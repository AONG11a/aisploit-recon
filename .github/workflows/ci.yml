name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (dev + optional extras for full type coverage)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,judge,browser]"

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Mypy (strict)
        run: mypy src

      - name: Pytest
        env:
          # The mock targets are local; never route 127.0.0.1 through a proxy.
          NO_PROXY: "127.0.0.1,localhost"
        run: pytest -q
